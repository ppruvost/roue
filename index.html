<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roue Classe Puzzle</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{margin-top:20px;border:2px solid #000}
button,input{margin:5px;padding:10px}
.results{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:10px;padding:10px;width:240px;border-radius:8px;background:#fff}
.puzzle{width:40px}
</style>
</head>

<body>

<h2>Roue Classe Puzzle</h2>

<input type="file" id="fileInput" accept=".txt">
<button onclick="loadFromFile()">Charger fichier</button>

<br>
<button onclick="tirageSeance1()">Séance 1 : Groupes adaptatifs</button>
<button onclick="tirageSeance2()">Séance 2 : Groupes puzzle</button>

<canvas id="wheel" width="400" height="400"></canvas>
<br>
<button onclick="spin()">Tourner</button>

<div id="results" class="results"></div>

<script>

const ctx=document.getElementById("wheel").getContext("2d");

let eleves=[];
let segments=[];
let attribution=[];
let groupesSeance1={};

let startAngle=0,arc=0;

// rôles
const roles = [
{nom:"Espion", img:"espion.png"},
{nom:"Rapporteur", img:"rapporteur.png"},
{nom:"Calculateur", img:"calculateur.png"},
{nom:"Stratège", img:"stratege.png"},
{nom:"Médiateur", img:"mediateur.png"}
];

// 🎡 roue
function drawWheel(){
ctx.clearRect(0,0,400,400);

if(segments.length===0){
ctx.fillText("Charge fichier",130,200);
return;
}

arc=Math.PI*2/segments.length;

segments.forEach((s,i)=>{
let angle=startAngle+i*arc;

ctx.beginPath();
ctx.fillStyle="#ddd";
ctx.moveTo(200,200);
ctx.arc(200,200,200,angle,angle+arc);
ctx.fill();

ctx.save();
ctx.translate(200,200);
ctx.rotate(angle+arc/2);
ctx.fillStyle="#000";
ctx.textAlign="right";
ctx.fillText(s,180,10);
ctx.restore();
});

// flèche
ctx.fillStyle="#000";
ctx.beginPath();
ctx.moveTo(190,10);
ctx.lineTo(210,10);
ctx.lineTo(200,40);
ctx.fill();
}

// 🎡 spin
function spin(){
if(eleves.length===0)return alert("Charge fichier");

let vitesse = Math.random()*0.3 + 0.4;
let duree = 4000;
let start = Date.now();

(function anim(){
let elapsed = Date.now() - start;
vitesse *= 0.995;
startAngle += vitesse;
drawWheel();

if(elapsed < duree){
requestAnimationFrame(anim);
}else{
attribution = shuffle([...eleves]);
alert("Tirage effectué !");
}
})();
}

// mélange
function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

// fichier
function loadFromFile(){
let file=document.getElementById("fileInput").files[0];
if(!file)return alert("Choisir fichier");

let r=new FileReader();
r.onload=e=>{
eleves=e.target.result.split("\n").map(x=>x.trim()).filter(x=>x);
segments=[...eleves];
drawWheel();
};
r.readAsText(file);
}

// =======================
// 🧩 SÉANCE 1 ADAPTATIVE
// =======================
function tirageSeance1(){

  if(attribution.length===0) return alert("Tourne la roue");

  let nbEleves = attribution.length;
  let nbGroupes;

  // =========================
  // 🎯 GESTION ADAPTATIVE
  // =========================

  if(nbEleves <= 10){
    // max 3 groupes avec min 3 élèves
    nbGroupes = Math.min(3, Math.floor(nbEleves / 3));
    if(nbGroupes < 1) nbGroupes = 1;
  }
  else if(nbEleves > 20){
    nbGroupes = 5;
  }
  else{
    nbGroupes = 4;
  }

  groupesSeance1 = {};

  for(let i=1;i<=nbGroupes;i++){
    let key = i.toString().padStart(2,"0");
    groupesSeance1[key] = [];
  }

  // =========================
  // 🎯 RÉPARTITION ÉQUILIBRÉE
  // =========================

  let groupesTemp = {};
  for(let i=1;i<=nbGroupes;i++){
    let key = i.toString().padStart(2,"0");
    groupesTemp[key] = [];
  }

  let index = 0;

  attribution.forEach(nom => {
    let g = (index % nbGroupes) + 1;
    let key = g.toString().padStart(2,"0");
    groupesTemp[key].push(nom);
    index++;
  });

// =========================
// 🎯 ATTRIBUTION DES RÔLES AMÉLIORÉE
// =========================

Object.keys(groupesTemp).forEach(g => {

  let elevesGroupe = groupesTemp[g];
  let rolesDisponibles = [...roles];

  // ❌ supprimer espion si petit groupe OU classe ≤10
  if(elevesGroupe.length < 5 || nbEleves <= 10){
    rolesDisponibles = rolesDisponibles.filter(r => r.nom !== "Espion");
  }

  // 🎯 rôles obligatoires
  const rolesObligatoires = ["Rapporteur", "Médiateur"];

  // récupérer les objets rôles
  let obligatoires = rolesDisponibles.filter(r => rolesObligatoires.includes(r.nom));
  let autresRoles = rolesDisponibles.filter(r => !rolesObligatoires.includes(r.nom));

  // 🔀 mélanger
  obligatoires = shuffle(obligatoires);
  autresRoles = shuffle(autresRoles);

  let rolesFinal = [];

  // =========================
  // 1️⃣ ajouter rôles obligatoires
  // =========================
  obligatoires.forEach(role => {
    if(rolesFinal.length < elevesGroupe.length){
      rolesFinal.push(role);
    }
  });

  // =========================
  // 2️⃣ compléter sans doublon
  // =========================
  autresRoles.forEach(role => {
    if(rolesFinal.length < elevesGroupe.length){
      rolesFinal.push(role);
    }
  });

  // =========================
  // 3️⃣ fallback si pas assez de rôles
  // =========================
  let i = 0;
  while(rolesFinal.length < elevesGroupe.length){
    rolesFinal.push(autresRoles[i % autresRoles.length]);
    i++;
  }

  // 🔀 mélanger la distribution finale
  rolesFinal = shuffle(rolesFinal);

  // =========================
  // 4️⃣ attribution aux élèves
  // =========================
  elevesGroupe.forEach((nom,i) => {

    groupesSeance1[g].push({
      nom: nom,
      role: rolesFinal[i],
      roleIndex: i
    });

  });

});

afficherSeance1();
// =======================
// 🎨 SÉANCE 2
// =======================
function tirageSeance2(){

if(Object.keys(groupesSeance1).length===0)
return alert("Fais d'abord la séance 1");

let couleurs = ["Rouge","Vert","Bleu","Orange","Violet"];

let groupes = {};
couleurs.forEach(c => groupes[c] = []);

// récupérer tous les élèves
let tous = [];

Object.values(groupesSeance1).forEach(g=>{
g.forEach(e=>{
if(e) tous.push(e);
});
});

// mélanger
tous = shuffle(tous);

let total = tous.length;
let nbGroupes = couleurs.length;

// taille minimale par groupe
let base = Math.floor(total / nbGroupes);

// nombre de groupes qui auront +1 élève
let reste = total % nbGroupes;

// distribution équilibrée
let index = 0;

couleurs.forEach((c, i)=>{

let tailleGroupe = base + (i < reste ? 1 : 0);

for(let j=0; j<tailleGroupe; j++){
if(tous[index]){
groupes[c].push(tous[index]);
index++;
}
}

});

afficherSeance2(groupes);
}
// =======================
// 🖼️ affichage séance 1
// =======================
function afficherSeance1(){

let div=document.getElementById("results");
div.innerHTML="";

Object.keys(groupesSeance1).forEach(g=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>Groupe ${g}</h4>`;

groupesSeance1[g].forEach(e=>{
c.innerHTML+=`
<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">
<img src="${e.role.img}" class="puzzle">
<strong>${e.role.nom}</strong>
<span>- ${e.nom}</span>
</div>`;
});

div.appendChild(c);

});
}

// =======================
// 🖼️ affichage séance 2
// =======================
function afficherSeance2(groupes){

let div=document.getElementById("results");
div.innerHTML="";

Object.keys(groupes).forEach(g=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>Groupe ${g}</h4>`;

groupes[g].forEach(e=>{
c.innerHTML+=`
<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">
<img src="expert.png" class="puzzle">
<strong>Expert</strong>
<span>- ${e.nom}</span>
</div>`;
});

div.appendChild(c);

});
}

drawWheel();

</script>

</body>
</html>
