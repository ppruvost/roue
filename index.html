<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roue + Classe Puzzle</title>
<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{margin-top:20px;border:2px solid #000}
select,button,input{margin:5px;padding:10px}
.results{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:10px;padding:10px;width:150px;border-radius:8px;background:#fff}
.puzzle{width:80px;margin:5px}
</style>
</head>
<body>

<h2>Roue + Classe Puzzle</h2>

<input type="file" id="fileInput" accept=".txt">
<button onclick="loadFromFile()">Charger fichier TXT</button>

<br>
<button onclick="tirageCouleurs()">Séance 1 : Couleurs</button>
<button onclick="tirageLettres()">Séance 2 : Lettres</button>

<canvas id="wheel" width="400" height="400"></canvas>
<button onclick="spin()">Tourner</button>

<div id="results" class="results"></div>

<script>
const ctx=document.getElementById("wheel").getContext("2d");
let eleves=[];let segments=[];

const couleurs=["#e74c3c","#27ae60","#2980b9","#f1c40f","#9b59b6"];
const nomsCouleurs=["Rouge","Vert","Bleu","Jaune","Violet"];
const lettres=["A","B","C","D"];

let startAngle=0,arc=0;

function drawWheel(){
ctx.clearRect(0,0,400,400);
if(segments.length===0){ctx.fillText("Charge fichier",130,200);return;}
arc=Math.PI*2/segments.length;
segments.forEach((s,i)=>{
let angle=startAngle+i*arc;
ctx.beginPath();
ctx.fillStyle=couleurs[i%couleurs.length];
ctx.moveTo(200,200);
ctx.arc(200,200,200,angle,angle+arc);
ctx.fill();
ctx.save();ctx.translate(200,200);
ctx.rotate(angle+arc/2);
ctx.fillStyle="#000";ctx.textAlign="right";
ctx.fillText(s,180,10);ctx.restore();});
ctx.fillStyle="#000";
ctx.beginPath();ctx.moveTo(190,10);ctx.lineTo(210,10);ctx.lineTo(200,40);ctx.fill();}

function spin(){
if(segments.length===0)return alert("Charge fichier");
let t=Date.now(),dur=3000;
(function anim(){startAngle+=0.3;drawWheel();if(Date.now()-t<dur)requestAnimationFrame(anim);})();}

function loadFromFile(){
let file=document.getElementById("fileInput").files[0];
if(!file)return alert("Choisir fichier");
let r=new FileReader();
r.onload=e=>{
eleves=e.target.result.split("\n").map(x=>x.trim()).filter(x=>x);
segments=[...eleves];drawWheel();};
r.readAsText(file);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function display(data,labels,type){
let div=document.getElementById("results");div.innerHTML="";
Object.keys(data).forEach((k,i)=>{
let c=document.createElement("div");c.className="card";
c.innerHTML=`<h4>${labels[i]}</h4>`;

// ajout logo puzzle
let img=document.createElement("img");
img.src=`puzzle_${labels[i]}.png`;
img.className="puzzle";
c.appendChild(img);

c.innerHTML += data[k].map(e => `
  <div style="display:flex;align-items:center;justify-content:center;gap:5px;">
    <img src="puzzle_${labels[i]}.png" class="puzzle">
    <span>${e}</span>
  </div>
`).join("");
div.appendChild(c);
});}

// adaptable nombre élèves
function tirageCouleurs(){
if(eleves.length===0)return alert("Charge fichier");
let mel=shuffle([...eleves]);
let groupes={0:[],1:[],2:[],3:[],4:[]};
mel.forEach((e,i)=>{groupes[i%5].push(e)});
display(groupes,nomsCouleurs,"couleur");}

function tirageLettres(){
if(eleves.length===0)return alert("Charge fichier");
let mel=shuffle([...eleves]);
let groupes={A:[],B:[],C:[],D:[]};
mel.forEach((e,i)=>{groupes[lettres[i%4]].push(e)});
display(groupes,lettres,"lettre");}

drawWheel();
</script>

</body>
</html>
