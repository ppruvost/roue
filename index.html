<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roue Classe Puzzle</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{margin-top:20px;border:2px solid #000}
button,input{margin:5px;padding:10px}
.results{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:10px;padding:10px;width:170px;border-radius:8px;background:#fff}
.puzzle{width:50px}
</style>
</head>

<body>

<h2>Roue Classe Puzzle</h2>

<input type="file" id="fileInput" accept=".txt">
<button onclick="loadFromFile()">Charger fichier</button>

<br>
<button onclick="tirageCouleurs()">Séance 1 : Couleurs</button>
<button onclick="tirageLettres()">Séance 2 : Lettres</button>

<canvas id="wheel" width="400" height="400"></canvas>
<br>
<button onclick="spin()">Tourner (tirage unique)</button>

<div id="results" class="results"></div>

<script>

const ctx=document.getElementById("wheel").getContext("2d");

let eleves=[];
let segments=[];

// 🎨 couleurs
const couleurs=["#ff3b30","#34c759","#007aff","#ff9500","#af52de"];
const nomsCouleurs=["Rouge","Vert","Bleu","Orange","Violet"];

let startAngle=0,arc=0;

// stockage du tirage
let attribution=[];

// 🎡 roue
function drawWheel(){
ctx.clearRect(0,0,400,400);

if(segments.length===0){
ctx.fillText("Charge fichier",130,200);
return;
}

arc=Math.PI*2/segments.length;

segments.forEach((s,i)=>{
let angle=startAngle+i*arc;

ctx.beginPath();
ctx.fillStyle=couleurs[i%5];
ctx.moveTo(200,200);
ctx.arc(200,200,200,angle,angle+arc);
ctx.fill();

ctx.save();
ctx.translate(200,200);
ctx.rotate(angle+arc/2);
ctx.fillStyle="#000";
ctx.textAlign="right";
ctx.fillText(s,180,10);
ctx.restore();
});

// flèche
ctx.fillStyle="#000";
ctx.beginPath();
ctx.moveTo(190,10);
ctx.lineTo(210,10);
ctx.lineTo(200,40);
ctx.fill();
}

// 🎡 SPIN
function spin(){

if(eleves.length===0)return alert("Charge fichier");

// reset attribution
attribution=[];

// vitesse initiale
let vitesse = Math.random()*0.3 + 0.4;

// durée
let duree = 9000;
let start = Date.now();

// son
let audio = new Audio("roulette.mp3");
audio.loop = true;
audio.play();

(function anim(){

let elapsed = Date.now() - start;

// ralentissement
vitesse *= 0.995;
startAngle += vitesse;

drawWheel();

if(elapsed < duree){
requestAnimationFrame(anim);
}else{

audio.pause();
audio.currentTime = 0;

// tirage final
tirageUnique();

alert("Tirage effectué ! Tu peux lancer les séances.");

}

})();

}

// 🎯 tirage UNIQUE
function tirageUnique(){

let mel = shuffle([...eleves]);

attribution = mel.map((nom, i)=>({
nom: nom,
couleur: nomsCouleurs[i%5],
numero: (i%5)+1
}));

}

// 🔀 mélange
function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

// 📂 fichier
function loadFromFile(){
let file=document.getElementById("fileInput").files[0];
if(!file)return alert("Choisir fichier");

let r=new FileReader();
r.onload=e=>{
eleves=e.target.result.split("\n").map(x=>x.trim()).filter(x=>x);
segments=[...eleves];
drawWheel();
};
r.readAsText(file);
}

// 🎨 séance 1
function tirageCouleurs(){

if(attribution.length===0)return alert("Fais d'abord tourner la roue");

let groupes={Rouge:[],Vert:[],Bleu:[],Orange:[],Violet:[]};

attribution.forEach(e=>{
groupes[e.couleur].push(e);
});

afficher(groupes);
}

// 🔤 séance 2
function tirageLettres(){

if(attribution.length===0)return alert("Fais d'abord tourner la roue");

let mel=shuffle([...attribution]);

let lettres=["A","B","C","D","E"];
let groupes={A:[],B:[],C:[],D:[],E:[]};

mel.forEach((e,i)=>{
groupes[lettres[i%5]].push(e);
});

afficher(groupes);
}

// 🖼️ affichage
function afficher(groupes){

let div=document.getElementById("results");
div.innerHTML="";

Object.keys(groupes).forEach(g=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>${g}</h4>`;

groupes[g].forEach(e=>{

c.innerHTML+=`
<div style="display:flex;align-items:center;gap:5px;">
<img src="puzzle_${e.numero}_${e.couleur}.png" class="puzzle">
<span>${e.nom}</span>
</div>`;

});

div.appendChild(c);

});
}

drawWheel();

</script>

</body>
</html>
