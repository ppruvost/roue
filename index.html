<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roue Classe Puzzle</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{margin-top:20px;border:2px solid #000}
button,input{margin:5px;padding:10px}
.results{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:10px;padding:10px;width:230px;border-radius:8px;background:#fff}
.puzzle{width:40px}
</style>
</head>

<body>

<h2>Roue Classe Puzzle</h2>

<input type="file" id="fileInput" accept=".txt">
<button onclick="loadFromFile()">Charger fichier</button>

<br>
<button onclick="tirageSeance1()">Séance 1 : 4 groupes</button>
<button onclick="tirageSeance2()">Séance 2 : Groupes couleurs</button>

<canvas id="wheel" width="400" height="400"></canvas>
<br>
<button onclick="spin()">Tourner</button>

<div id="results" class="results"></div>

<script>

const ctx=document.getElementById("wheel").getContext("2d");

let eleves=[];
let segments=[];
let attribution=[];

let startAngle=0,arc=0;

// rôles séance 1 (ordre dans groupe)
const roles = [
{nom:"Espion", img:"espion.png"},
{nom:"Rapporteur", img:"rapporteur.png"},
{nom:"Calculateur", img:"calculateur.png"},
{nom:"Stratège", img:"stratege.png"},
{nom:"Médiateur", img:"mediateur.png"}
];

// couleurs séance 2
const couleurs = ["Rouge","Vert","Bleu","Orange","Violet"];


// 🎡 roue
function drawWheel(){
ctx.clearRect(0,0,400,400);

if(segments.length===0){
ctx.fillText("Charge fichier",130,200);
return;
}

arc=Math.PI*2/segments.length;

segments.forEach((s,i)=>{
let angle=startAngle+i*arc;

ctx.beginPath();
ctx.fillStyle="#ddd";
ctx.moveTo(200,200);
ctx.arc(200,200,200,angle,angle+arc);
ctx.fill();

ctx.save();
ctx.translate(200,200);
ctx.rotate(angle+arc/2);
ctx.fillStyle="#000";
ctx.textAlign="right";
ctx.fillText(s,180,10);
ctx.restore();
});

// flèche
ctx.fillStyle="#000";
ctx.beginPath();
ctx.moveTo(190,10);
ctx.lineTo(210,10);
ctx.lineTo(200,40);
ctx.fill();
}


// 🎡 SPIN
function spin(){
if(eleves.length===0)return alert("Charge fichier");

let vitesse = Math.random()*0.3 + 0.4;
let duree = 4000;
let start = Date.now();

(function anim(){
let elapsed = Date.now() - start;
vitesse *= 0.995;
startAngle += vitesse;
drawWheel();

if(elapsed < duree){
requestAnimationFrame(anim);
}else{
tirageUnique();
alert("Tirage effectué !");
}
})();
}


// 🔀 mélange UNIQUE (base des 2 séances)
function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

function tirageUnique(){
attribution = shuffle([...eleves]);
}


// 📂 fichier
function loadFromFile(){
let file=document.getElementById("fileInput").files[0];
if(!file)return alert("Choisir fichier");

let r=new FileReader();
r.onload=e=>{
eleves=e.target.result.split("\n").map(x=>x.trim()).filter(x=>x);

// limiter à 20 élèves
if(eleves.length > 20){
alert("Maximum 20 élèves (4 groupes de 5)");
eleves = eleves.slice(0,20);
}

segments=[...eleves];
drawWheel();
};
r.readAsText(file);
}


// =======================
// 🧩 SÉANCE 1 (4 groupes de 5)
// =======================
function tirageSeance1(){

if(attribution.length===0)return alert("Tourne la roue d'abord");

let groupes={
"01":[],
"02":[],
"03":[],
"04":[]
};

attribution.forEach((nom, index)=>{

let groupeIndex = Math.floor(index/5); // 0 à 3

if(groupeIndex < 4){

let roleIndex = index % 5;

groupes["0"+(groupeIndex+1)].push({
nom: nom,
role: roles[roleIndex]
});

}

});

afficherSeance1(groupes);
}


// =======================
// 🎨 SÉANCE 2 (5 groupes de 4)
// =======================
function tirageSeance2(){

if(attribution.length===0)return alert("Tourne la roue d'abord");

let groupes={
"Rouge":[],
"Vert":[],
"Bleu":[],
"Orange":[],
"Violet":[]
};

// même ordre, nouvelle organisation
attribution.forEach((nom, index)=>{

let couleurIndex = index % 5;
let couleur = couleurs[couleurIndex];

// max 4 élèves par groupe
if(groupes[couleur].length < 4){
groupes[couleur].push({
nom: nom
});
}

});

afficherSeance2(groupes);
}


// =======================
// 🖼️ affichage séance 1
// =======================
function afficherSeance1(groupes){

let div=document.getElementById("results");
div.innerHTML="";

Object.keys(groupes).forEach(g=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>Groupe ${g}</h4>`;

groupes[g].forEach(e=>{

c.innerHTML+=`
<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">
<img src="${e.role.img}" class="puzzle">
<strong>${e.role.nom}</strong>
<span>- ${e.nom}</span>
</div>`;

});

div.appendChild(c);

});
}


// =======================
// 🖼️ affichage séance 2
// =======================
function afficherSeance2(groupes){

let div=document.getElementById("results");
div.innerHTML="";

Object.keys(groupes).forEach(g=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>Groupe ${g}</h4>`;

groupes[g].forEach(e=>{

c.innerHTML+=`
<div style="display:flex;align-items:center;gap:8px;margin:6px 0;">
<img src="expert.png" class="puzzle">
<strong>Expert</strong>
<span>- ${e.nom}</span>
</div>`;

});

div.appendChild(c);

});
}


drawWheel();

</script>

</body>
</html>
