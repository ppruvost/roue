<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Roue Classe Puzzle</title>

<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
canvas{margin-top:20px;border:2px solid #000}
button,input{margin:5px;padding:10px}
.results{display:flex;flex-wrap:wrap;justify-content:center}
.card{border:2px solid #000;margin:10px;padding:10px;width:200px;border-radius:8px;background:#fff}
.puzzle{width:40px}
</style>
</head>

<body>

<h2>Roue Classe Puzzle</h2>

<input type="file" id="fileInput" accept=".txt">
<button onclick="loadFromFile()">Charger fichier</button>

<br>
<button onclick="tirageSeance1()">Séance 1 : Groupes 01 à 05</button>
<button onclick="tirageSeance2()">Séance 2 : Groupes Couleurs</button>

<canvas id="wheel" width="400" height="400"></canvas>
<br>
<button onclick="spin()">Tourner</button>

<div id="results" class="results"></div>

<script>

const ctx=document.getElementById("wheel").getContext("2d");

let eleves=[];
let segments=[];

// couleurs
const couleurs=["#FF0000","#34c759","#007aff","#ff9500","#af52de"];
const nomsCouleurs=["Rouge","Vert","Bleu","Orange","Violet"];

let startAngle=0,arc=0;
let attribution=[];

// rôles séance 1
const roles = {
1:{nom:"Espion", img:"espion.png"},
2:{nom:"Rapporteur", img:"rapporteur.png"},
3:{nom:"Calculateur", img:"calculateur.png"},
4:{nom:"Stratège", img:"stratege.png"},
5:{nom:"Médiateur", img:"mediateur.png"}
};

// 🎡 roue
function drawWheel(){
ctx.clearRect(0,0,400,400);

if(segments.length===0){
ctx.fillText("Charge fichier",130,200);
return;
}

arc=Math.PI*2/segments.length;

segments.forEach((s,i)=>{
let angle=startAngle+i*arc;

ctx.beginPath();
ctx.fillStyle=couleurs[i%5];
ctx.moveTo(200,200);
ctx.arc(200,200,200,angle,angle+arc);
ctx.fill();

ctx.save();
ctx.translate(200,200);
ctx.rotate(angle+arc/2);
ctx.fillStyle="#000";
ctx.textAlign="right";
ctx.fillText(s,180,10);
ctx.restore();
});

// flèche
ctx.fillStyle="#000";
ctx.beginPath();
ctx.moveTo(190,10);
ctx.lineTo(210,10);
ctx.lineTo(200,40);
ctx.fill();
}

// 🎡 SPIN
function spin(){
if(eleves.length===0)return alert("Charge fichier");

let vitesse = Math.random()*0.3 + 0.4;
let duree = 5000;
let start = Date.now();

(function anim(){
let elapsed = Date.now() - start;
vitesse *= 0.995;
startAngle += vitesse;
drawWheel();

if(elapsed < duree){
requestAnimationFrame(anim);
}else{
tirageUnique();
alert("Tirage effectué !");
}
})();
}

// 🎯 attribution unique
function tirageUnique(){

let mel = shuffle([...eleves]);

let compteurs = {Rouge:0,Vert:0,Bleu:0,Orange:0,Violet:0};

attribution = mel.map((nom, i)=>{
let couleur = nomsCouleurs[i%5];
compteurs[couleur]++;

return {
nom: nom,
couleur: couleur,
numero: compteurs[couleur]
};
});

}

// 🔀 mélange
function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

// 📂 fichier
function loadFromFile(){
let file=document.getElementById("fileInput").files[0];
if(!file)return alert("Choisir fichier");

let r=new FileReader();
r.onload=e=>{
eleves=e.target.result.split("\n").map(x=>x.trim()).filter(x=>x);
segments=[...eleves];
drawWheel();
};
r.readAsText(file);
}

// =======================
// 🧩 SÉANCE 1 (groupes 01 à 05)
// =======================
function tirageSeance1(){

if(attribution.length===0)return alert("Tourne la roue d'abord");

let groupes={"01":[],"02":[],"03":[],"04":[],"05":[]};

attribution.forEach(e=>{
let num = e.numero;
if(num<=5){
groupes["0"+num].push(e);
}
});

// affichage avec rôles
afficher(groupes, "seance1");
}

// =======================
// 🎨 SÉANCE 2 (couleurs)
// =======================
function tirageSeance2(){

if(attribution.length===0)return alert("Tourne la roue d'abord");

let groupes={Rouge:[],Vert:[],Bleu:[],Orange:[],Violet:[]};

attribution.forEach(e=>{
groupes[e.couleur].push(e);
});

afficher(groupes, "seance2");
}

// =======================
// 🖼️ affichage
// =======================
function afficher(groupes, mode){

let div=document.getElementById("results");
div.innerHTML="";

Object.keys(groupes).forEach(g=>{

let c=document.createElement("div");
c.className="card";
c.innerHTML=`<h4>Groupe ${g}</h4>`;

groupes[g].forEach(e=>{

let roleHTML="";

if(mode==="seance1"){
let role = roles[e.numero];
roleHTML = `<img src="${role.img}" class="puzzle"> ${role.nom}`;
}

if(mode==="seance2"){
roleHTML = `<img src="expert.png" class="puzzle"> Expert`;
}

c.innerHTML+=`
<div style="display:flex;align-items:center;gap:5px;margin:5px 0;">
${roleHTML}
<span>${e.nom}</span>
</div>`;
});

div.appendChild(c);

});
}

drawWheel();

</script>

</body>
</html>
